name: Build and Release

on:
  push:
    tags:
      - cli/*

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Configure Git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.TOKEN }}@github.com/".insteadOf "git@github.com:"
      - name: Configure GOPRIVATE
        run: |
          echo "GOPRIVATE=github.com/diaphora-ai/*,github.com/theirish81/*" >> $GITHUB_ENV
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.4'
      - name: Write version file
        working-directory: cli
        run: |
          cat > version.go <<EOF
          package main

          const version = "${GITHUB_REF_NAME}"
          EOF
      - name: Build
        working-directory: cli
        run: |
          mkdir target
          GOOS=linux GOARCH=amd64 go build -o target/frags-linux -v .
          GOOS=windows GOARCH=amd64 go build -o target/frags.exe -v .
          GOOS=darwin GOARCH=amd64 go build -o target/frags-darwin-amd64 -v .
          GOOS=darwin GOARCH=arm64 go build -o target/frags-darwin-arm64 -v .
      - name: GitHub Releases
        uses: fnkr/github-action-ghr@v1.3
        env:
          GHR_PATH: cli/target/
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}