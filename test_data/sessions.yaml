sessions:
  session_one:
    prompt: extract these pieces of information
    resources:
      - identifier: doc.pdf
  session_two:
    prompt: extract these images data. Make sure they contain {{ .params.animal }}
    resources:
      - identifier: img.pdf
schema:
  required:
    - p1
    - p2
    - p3
    - p4
  properties:
    p1:
      x-session: session_one
      type: string
    p3:
      x-session: session_two
      type: string
